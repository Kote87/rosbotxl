version: "3.8"

services:
  # --- Cámara OAK ---
  oak:
    # ← ESTA línea borra el depends_on que viene del compose.yaml base
    depends_on: []
    image: luxonis/depthai-ros:v2.11.0-humble
    privileged: true
    network_mode: "service:navigation"
    devices:
      - /dev/bus/usb:/dev/bus/usb
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
               ros2 launch depthai_ros_driver camera.launch.py"
    restart: unless-stopped

  # --- Bridge de navegación + Foxglove ---
  navigation:
    depends_on:
      - rosbot     # nodo base
      - rplidar    # láser 2-D
      - oak        # cámara OAK (queremos que exista antes de lanzar el bridge)
