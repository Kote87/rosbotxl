version: "3.8"

services:
  oak:
    image: luxonis/depthai-ros:v2.11.0-humble
    privileged: true                 # acceso completo al USB
    network_mode: "service:navigation"
    depends_on: [navigation]
    devices:
      - /dev/bus/usb:/dev/bus/usb    # pasa todo el bus USB
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
               ros2 launch depthai_ros_driver camera.launch.py"
    restart: unless-stopped
