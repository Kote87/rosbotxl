version: "3.8"

services:
  # --- Cámara OAK ---
  oak:
    depends_on: []                # ← anula la dependencia que viene de compose.yaml
    image: luxonis/depthai-ros:v2.11.0-humble
    privileged: true
    network_mode: "service:navigation"
    devices:
      - /dev/bus/usb:/dev/bus/usb
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
               ros2 launch depthai_ros_driver camera.launch.py"
    restart: unless-stopped

  # --- Contenedor navigation (foxglove_bridge dentro) ---
  navigation:
    # aquí NO añadimos oak para evitar el ciclo;
    # mantenemos sólo lo que ya tiene en el fichero base
    # (normalmente rosbot y rplidar).  Si ese bloque no
    # existe en tu override, déjalo tal cual.
