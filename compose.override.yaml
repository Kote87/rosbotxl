version: "3.8"

services:
  # --- Cámara OAK ---
  oak:
    # ➊ ANULA la dependencia que trae el YAML base
    depends_on: {}          # ← mapa vacío: elimina "oak -> navigation"
    image: luxonis/depthai-ros:v2.11.0-humble
    privileged: true
    network_mode: "service:navigation"
    devices:
      - /dev/bus/usb:/dev/bus/usb
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
               ros2 launch depthai_ros_driver camera.launch.py"
    restart: unless-stopped

  # --- Contenedor navigation (foxglove_bridge dentro) ---
  navigation:
    # ➋ AÑADE la cámara a sus dependencias  
    #    (rosbot y rplidar ya vienen en el compose base)
  
