version: "3.8"

services:
  oak:
    depends_on: {}          # rompe la arista 'oak -> navigation'
    image: luxonis/depthai-ros:v2.11.0-humble
    privileged: true
    network_mode: "service:navigation"
    devices:
      - /dev/bus/usb:/dev/bus/usb
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
               ros2 launch depthai_ros_driver camera.launch.py"
    restart: unless-stopped

  navigation:
    image: ghcr.io/foxglove/foxglove_bridge:0.10.2-humble
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
               ros2 run foxglove_bridge foxglove_bridge
               --address 0.0.0.0 --port 8765 --auto-start"

