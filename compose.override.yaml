version: "3.8"

services:
  oak:
    # Imagen oficial de Luxonis con el driver ROS 2 Humble
    image: luxonis/depthai-ros:v2.11.0-humble

    # Comparte ROS DOMAIN con el resto de la pila
    network_mode: "service:navigation"
    depends_on: [navigation]

    # ➜ añadido (privilegios completos para que el contenedor
    # pueda hablar por USB con la OAK-D sin trabas)
    privileged: true

    # ➜ confirmado (mapea todo el bus USB dentro del contenedor)
    devices:
      - /dev/bus/usb:/dev/bus/usb

    environment:
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp

    # Lanzamos solo la cámara RGB a 400 P @ 15 fps, sin NN ni depth
    command: >
      bash -c "
      source /opt/ros/humble/setup.bash &&
      ros2 launch depthai_ros_driver camera.launch.py
        pipeline_type:=RGB
        rgb_resolution:=400P
        rgb_fps:=15
        nn_type:=none
        rectify_color:=false
        enable_depth:=false
        usb2_mode:=false
      "

    restart: unless-stopped
