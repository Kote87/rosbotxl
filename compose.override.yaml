version: "3.8"

services:
  oak:
    image: luxonis/depthai-ros:v2.11.0-humble   # imagen correcta
    network_mode: "service:navigation"          # comparte el mismo ROS DOMAIN
    depends_on: [navigation]
    devices:
      - /dev/bus/usb:/dev/bus/usb               # pasa el dispositivo USB al contenedor
    environment:
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    command: >
      bash -c "
      source /opt/ros/humble/setup.bash &&
      ros2 launch depthai_ros_driver camera.launch.py
        pipeline_type:=RGB
        rgb_resolution:=400P
        rgb_fps:=15
        nn_type:=none
        rectify_color:=false
        enable_depth:=false
        usb2_mode:=false
      "
    restart: unless-stopped
